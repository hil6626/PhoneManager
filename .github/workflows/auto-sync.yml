name: Auto Sync Repo
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest
        run: git pull origin main
      - name: Auto commit changes
        run: |
          git config user.name "blackboxai"
          git config user.email "ai@example.com"
          git add .
          git commit -m "auto sync $(date)" || true
          git push origin main
